name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python -m pip install -r requirements-dev.txt -c constraints.txt
      - run: python -m pytest -q
